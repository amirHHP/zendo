<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zendo GTD Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">ZENDO</div>
      <div class="header-actions">
        <button id="btn-settings" class="icon-button" title="Settings">Settings</button>
      </div>
    </header>

    <!-- Quick Add Section -->
    <section class="quick-add-section">
      <input type="text" id="input-quick-add" placeholder="Capture: what needs to be done? (Press Enter)" autofocus autocomplete="off">
    </section>

    <!-- Workspace Layout -->
    <div class="workspace">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-item active" id="nav-inbox">
          <span class="icon">📥</span>
          <span class="label">Inbox</span>
          <span class="badge" id="badge-inbox">0</span>
        </div>
        
        <div class="sidebar-section">
          <div class="section-title">PROJECTS</div>
          <div class="projects-tree" id="projects-tree">
            <!-- Dynamic tree items go here -->
          </div>
          <div class="add-project-container">
            <input type="text" id="input-new-project" placeholder="+ New project..." autocomplete="off">
          </div>
        </div>
      </aside>

      <!-- Main Panel (List + Details) -->
      <main class="main-panel">
        <div class="list-container">
          <div class="list-header">
            <h2 id="current-view-title">Inbox</h2>
            <div class="list-actions">
              <button id="btn-elaborate-inbox" class="primary-button hidden">Elaborate</button>
              <button id="btn-organize-inbox" class="primary-button hidden">Organize</button>
            </div>
          </div>
          <div class="task-list" id="task-list">
            <!-- Dynamic task items go here -->
          </div>
        </div>

        <!-- Task Details Drawer -->
        <aside class="details-panel hidden" id="details-panel">
          <div class="details-header">
            <h3>Task Details</h3>
            <button id="btn-close-details" class="close-button">&times;</button>
          </div>
          <div class="details-content">
            <div class="form-group">
              <label>Task</label>
              <textarea id="detail-task-text" rows="2"></textarea>
            </div>

            <div class="form-group">
              <label>Project</label>
              <select id="detail-task-project">
                <option value="inbox">Inbox</option>
                <!-- Dynamic projects populated via JS -->
              </select>
            </div>
            
            <div class="form-group">
              <label>Notes</label>
              <textarea id="detail-task-notes" placeholder="Add details or thoughts..." rows="4"></textarea>
            </div>

            <div class="subtasks-section">
              <label>Subtasks</label>
              <div class="subtasks-list" id="detail-subtasks-list">
                <!-- Dynamic subtasks go here -->
              </div>
              <div class="add-subtask-container">
                <input type="text" id="input-new-subtask" placeholder="+ Add subtask..." autocomplete="off">
              </div>
            </div>
          </div>
        </aside>
      </main>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay hidden" id="settings-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Settings</h3>
        <button id="btn-close-settings" class="close-button">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="input-api-key">Gemini API Key</label>
          <input type="password" id="input-api-key" placeholder="Enter Gemini API Key">
          <small class="help-text">Your key is stored locally in Chrome storage.</small>
        </div>
        <div class="form-group">
          <label for="select-model">Model</label>
          <select id="select-model">
            <option value="gemini-2.5-flash">Gemini 2.5 Flash (Fast, Recommended)</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro (Powerful)</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-save-settings" class="primary-button">Save Settings</button>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
